<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Taskman</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/client/static/logo.png">
<link rel="stylesheet" href="/client/styles/style.css">
</head>
<body>

<aside id="sidebar">
  <div class="sidebar-logo">
    <img src="/client/static/logo.png"/>
    <p>Taskman</p>
  </div>
  <div class="sidebar-lists">
    <div id="list-nav"></div>
  </div>
</aside>

<div id="content">
  <div id="topbar">
    <div id="filter-bar"></div>
    <button id="theme-toggle" class="theme-toggle" title="Toggle light/dark mode"></button>
  </div>
  <main id="main"></main>
  <iframe id="calendar-frame" class="calendar-frame" frameborder="0" scrolling="no" style="display:none"></iframe>
</div>

<div id="toast"></div>
<script src="/client/scripts/theme.js"></script>
<script src="/client/scripts/core.js"></script>
<script src="/client/scripts/sidebar.js"></script>
<script src="/client/scripts/tasks.js"></script>
<script src="/client/scripts/daysheet.js"></script>
<script src="/client/scripts/topbar.js"></script>
<script src="/client/scripts/app.js"></script>
</body>
</html>
