<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>taskman</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <h1>taskman</h1>
  <nav id="tabs">
    <button data-view="tasks" class="active">Tasks</button>
    <button data-view="daysheet">Daysheet</button>
    <div id="task-filter" class="filter-toggle">
      <button data-filter="all" class="active">All</button>
      <button data-filter="week">Week</button>
      <button data-filter="today">Today</button>
    </div>
  </nav>
</header>
<main id="main"></main>
<div id="toast"></div>
<script src="/static/app.js"></script>
</body>
</html>
